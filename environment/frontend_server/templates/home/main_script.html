	// ###########################################################################

	// <step> -- one full loop around all three phases determined by <phase> is

	}


	// Phaser 3.0 global settings.

	// const config = {

	// Creating the game instance and setting up the main Phaser variables that  
	// will be used in it. 
	const game = new Phaser.Game(config);
	let player;
	let mainCamera;
	let uiCamera;
	let showDebug = false;
	let cameraDragState = {
		active: false,
		pointerId: null,
		lastX: 0,
		lastY: 0
	};
	let cameraInputState = {
		left: false,
		right: false,
		up: false,
		down: false
	};
	let cameraBounds = {
		width: 0,
		height: 0
	};
	const cameraZoomMin = 0.5;
	const cameraZoomMax = 2.5;
	const cameraZoomLevels = [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0, 2.25, 2.5];
	let cameraZoomLevelIndex = 2;
	let gameShellInputHandlersInstalled = false;

	// Persona related variables. This should have the name of the persona as its

	var spawn_tile_loc = {};
	// for (var i = 0; i < persona_names.length; i++) {

	// }

	for (var key in persona_names){
		spawn_tile_loc[key] = persona_names[key] ;

	console.log(spawn_tile_loc);

	var personas = {};
	var pronunciatios = {};
	var persona_name_labels = {};
	var offscreen_persona_indicators = {};
	let anims_direction;
	let pre_anims_direction;
	let pre_anims_direction_dict = {};

	let curr_maze = "the_ville";

	// <tile_width> is the width of one individual tile (tiles are square)
	let tile_width = 32;

	// <movement_speed> determines how fast we move at each upate cylce. 
	let movement_speed = 32; 

	// <timer_max> determines how frequently our update function will query the 
	// frontend server. If it's higher, we wait longer cycles. 
	let timer_max = 0;

	// <phase> -- there are three phases: "process," "update," and "execute."
	let phase = "update"; // or "update" or "execute"

	// Variables for storing movements that are sent from the backend server.
	let execute_movement;

	let execute_count = execute_count_max;
	let movement_target = {};
	let simulation_status_request_in_flight = false;
	let simulation_command_request_in_flight = false;
	let simulation_command_result_request_in_flight = false;
	let is_game_focused = false;
	let last_direction_indicator = "·";
	let cameraCenter = {x: 800, y: 288};
	const game_shell = document.getElementById("game-shell");
	const game_focus_chip = document.getElementById("game-focus-chip");
	const game_direction_chip = document.getElementById("game-direction-chip");


	function clamp_camera_center(x, y) {
		if (!mainCamera) {
			return {"x": x, "y": y};
		}

		let halfWorldWidth = Math.max(0, mainCamera.width / (2 * mainCamera.zoom));
		let halfWorldHeight = Math.max(0, mainCamera.height / (2 * mainCamera.zoom));

		let centerX = x;
		let centerY = y;
		if (cameraBounds.width <= halfWorldWidth * 2) {
			centerX = cameraBounds.width / 2;
		} else {
			centerX = Phaser.Math.Clamp(x, halfWorldWidth, cameraBounds.width - halfWorldWidth);
		}

		if (cameraBounds.height <= halfWorldHeight * 2) {
			centerY = cameraBounds.height / 2;
		} else {
			centerY = Phaser.Math.Clamp(y, halfWorldHeight, cameraBounds.height - halfWorldHeight);
		}

		return {"x": centerX, "y": centerY};
	}


	function apply_camera_center(x, y) {
		if (!mainCamera) {
			return;
		}

		let nextCenter = clamp_camera_center(x, y);
		let halfWorldWidth = mainCamera.width / (2 * mainCamera.zoom);
		let halfWorldHeight = mainCamera.height / (2 * mainCamera.zoom);
		cameraCenter.x = nextCenter.x;
		cameraCenter.y = nextCenter.y;
		mainCamera.scrollX = Math.round(cameraCenter.x - halfWorldWidth);
		mainCamera.scrollY = Math.round(cameraCenter.y - halfWorldHeight);

		if (player) {
			player.setPosition(Math.round(cameraCenter.x), Math.round(cameraCenter.y));
			if (player.body) {
				player.body.reset(Math.round(cameraCenter.x), Math.round(cameraCenter.y));
			}
		}
	}


	function apply_camera_zoom(nextZoom) {
		if (!mainCamera) {
			return;
		}
		let snappedZoom = nextZoom;
		if (cameraZoomLevels && cameraZoomLevels.length > 0) {
			let bestZoom = cameraZoomLevels[0];
			let bestDistance = Math.abs(nextZoom - bestZoom);
			let bestIndex = 0;
			for (let i = 1; i < cameraZoomLevels.length; i++) {
				let candidate = cameraZoomLevels[i];
				let distance = Math.abs(nextZoom - candidate);
				if (distance < bestDistance) {
					bestZoom = candidate;
					bestDistance = distance;
					bestIndex = i;
				}
			}
			snappedZoom = bestZoom;
			cameraZoomLevelIndex = bestIndex;
		}
		mainCamera.setZoom(Phaser.Math.Clamp(snappedZoom, cameraZoomMin, cameraZoomMax));
		apply_camera_center(cameraCenter.x, cameraCenter.y);
	}


	function set_game_focus(active) {
		is_game_focused = active;
		if (!active) {
			cameraDragState.active = false;
			cameraDragState.pointerId = null;
			reset_camera_input_state();
		}
		if (!game_shell) {
			return;
		}
		game_shell.style.borderColor = active ? "#43A047" : "#D7D7D7";
		game_shell.style.boxShadow = active ? "0 0 0 5px rgba(67, 160, 71, 0.18)" : "none";
		refresh_camera_shell_cursor();
		if (game_focus_chip) {
			game_focus_chip.textContent = active ? "Map controls active" : "Map controls inactive";
			game_focus_chip.style.color = active ? "#2E7D32" : "#666666";
			game_focus_chip.style.borderColor = active ? "#81C784" : "#D5D5D5";
		}
	}


	function refresh_camera_shell_cursor() {
		if (!game_shell) {
			return;
		}
		if (!is_game_focused) {
			game_shell.style.cursor = "default";
			return;
		}
		game_shell.style.cursor = cameraDragState.active ? "grabbing" : "grab";
	}


	function reset_camera_input_state() {
		cameraInputState.left = false;
		cameraInputState.right = false;
		cameraInputState.up = false;
		cameraInputState.down = false;
	}


	function is_text_input_target(target) {
		if (!target) {
			return false;
		}
		let tagName = target.tagName ? target.tagName.toLowerCase() : "";
		return tagName === "input"
			|| tagName === "textarea"
			|| tagName === "select"
			|| tagName === "button"
			|| target.isContentEditable === true;
	}


	function update_camera_input_key_state(event, nextState) {
		if (!event) {
			return false;
		}
		let handled = true;
		switch (event.code) {
			case "KeyA":
			case "ArrowLeft":
				cameraInputState.left = nextState;
				break;
			case "KeyD":
			case "ArrowRight":
				cameraInputState.right = nextState;
				break;
			case "KeyW":
			case "ArrowUp":
				cameraInputState.up = nextState;
				break;
			case "KeyS":
			case "ArrowDown":
				cameraInputState.down = nextState;
				break;
			default:
				handled = false;
				break;
		}
		if (handled) {
			event.preventDefault();
		}
		return handled;
	}


	function apply_camera_drag(clientX, clientY) {
		if (!cameraDragState.active || !mainCamera) {
			return;
		}
		let dragDeltaX = clientX - cameraDragState.lastX;
		let dragDeltaY = clientY - cameraDragState.lastY;
		cameraDragState.lastX = clientX;
		cameraDragState.lastY = clientY;
		if (dragDeltaX === 0 && dragDeltaY === 0) {
			return;
		}
		apply_camera_center(
			cameraCenter.x - dragDeltaX / mainCamera.zoom,
			cameraCenter.y - dragDeltaY / mainCamera.zoom
		);
	}


	function install_game_shell_input_handlers(gameCanvas) {
		if (gameShellInputHandlersInstalled || !game_shell || !gameCanvas) {
			return;
		}

		gameShellInputHandlersInstalled = true;
		game_shell.style.userSelect = "none";
		game_shell.style.webkitUserSelect = "none";
		game_shell.style.touchAction = "none";
		gameCanvas.style.touchAction = "none";
		refresh_camera_shell_cursor();

		game_shell.addEventListener("focus", function() {
			set_game_focus(true);
		});
		game_shell.addEventListener("blur", function() {
			set_game_focus(false);
			update_direction_indicator("·");
		});
		game_shell.addEventListener("mousedown", function() {
			game_shell.focus();
		});

		window.addEventListener("keydown", function(event) {
			if (!is_game_focused || is_text_input_target(event.target)) {
				return;
			}
			update_camera_input_key_state(event, true);
		}, true);
		window.addEventListener("keyup", function(event) {
			if (!is_game_focused || is_text_input_target(event.target)) {
				return;
			}
			update_camera_input_key_state(event, false);
		}, true);
		window.addEventListener("blur", function() {
			set_game_focus(false);
			update_direction_indicator("·");
		});
		document.addEventListener("visibilitychange", function() {
			if (document.hidden) {
				set_game_focus(false);
				update_direction_indicator("·");
			}
		});

		gameCanvas.addEventListener("pointerdown", function(event) {
			if (event.button !== 0) {
				return;
			}
			game_shell.focus();
			cameraDragState.active = true;
			cameraDragState.pointerId = event.pointerId;
			cameraDragState.lastX = event.clientX;
			cameraDragState.lastY = event.clientY;
			refresh_camera_shell_cursor();
			if (gameCanvas.setPointerCapture) {
				gameCanvas.setPointerCapture(event.pointerId);
			}
			event.preventDefault();
		});
		window.addEventListener("pointermove", function(event) {
			if (!cameraDragState.active) {
				return;
			}
			if (cameraDragState.pointerId !== null && event.pointerId !== cameraDragState.pointerId) {
				return;
			}
			apply_camera_drag(event.clientX, event.clientY);
			event.preventDefault();
		}, {passive: false});
		function end_camera_drag(event) {
			if (!cameraDragState.active) {
				return;
			}
			if (event && cameraDragState.pointerId !== null && event.pointerId !== cameraDragState.pointerId) {
				return;
			}
			if (event && gameCanvas.releasePointerCapture && cameraDragState.pointerId !== null) {
				try {
					gameCanvas.releasePointerCapture(cameraDragState.pointerId);
				} catch (error) {
				}
			}
			cameraDragState.active = false;
			cameraDragState.pointerId = null;
			refresh_camera_shell_cursor();
		}
		window.addEventListener("pointerup", end_camera_drag);
		window.addEventListener("pointercancel", end_camera_drag);

		gameCanvas.addEventListener("wheel", function(event) {
			event.preventDefault();
			game_shell.focus();
			set_game_focus(true);
			if (event.deltaY === 0) {
				return;
			}
			let zoomDirection = event.deltaY > 0 ? -1 : 1;
			let nextIndex = Phaser.Math.Clamp(
				cameraZoomLevelIndex + zoomDirection,
				0,
				cameraZoomLevels.length - 1
			);
			apply_camera_zoom(cameraZoomLevels[nextIndex]);
		}, {passive: false});
	}


	function update_direction_indicator(directionSymbol) {
		last_direction_indicator = directionSymbol || "·";
		if (game_direction_chip) {
			game_direction_chip.textContent = "Direction: " + last_direction_indicator;
		}
	}


	function position_persona_label(persona_name) {
		let persona = personas[persona_name];
		let pronunciatio = pronunciatios[persona_name];
		let label = persona_name_labels[persona_name];
		if (!persona || !pronunciatio || !label) {
			return;
		}
		label.container.x = persona.body.x + 16;
		label.container.y = persona.body.y - 62;
		pronunciatio.x = persona.body.x + 16;
		pronunciatio.y = persona.body.y - 92;
	}


	function direction_symbol_from_vector(dx, dy) {
		let absX = Math.abs(dx);
		let absY = Math.abs(dy);
		if (absX < 1 && absY < 1) return "·";
		if (absX > absY * 1.5) return dx > 0 ? "→" : "←";
		if (absY > absX * 1.5) return dy > 0 ? "↓" : "↑";
		if (dx > 0 && dy > 0) return "↘";
		if (dx > 0 && dy < 0) return "↗";
		if (dx < 0 && dy > 0) return "↙";
		return "↖";
	}


	function refresh_offscreen_indicator(persona_name) {
		let indicator = offscreen_persona_indicators[persona_name];
		let persona = personas[persona_name];
		if (!indicator || !persona || !mainCamera) {
			return;
		}

		let worldX = persona.body.x + 16;
		let worldY = persona.body.y + 16;
		if (mainCamera.worldView.contains(worldX, worldY)) {
			indicator.container.setVisible(false);
			return;
		}

		let screenXRaw = (worldX - mainCamera.worldView.x) * mainCamera.zoom;
		let screenYRaw = (worldY - mainCamera.worldView.y) * mainCamera.zoom;
		let dx = screenXRaw - mainCamera.width / 2;
		let dy = screenYRaw - mainCamera.height / 2;
		let angle = Math.atan2(dy, dx);
		let marginX = 92;
		let marginY = 68;
		let halfScreenWidth = mainCamera.width / 2 - marginX;
		let halfScreenHeight = mainCamera.height / 2 - marginY;
		let cosValue = Math.cos(angle);
		let sinValue = Math.sin(angle);
		let xScale = Math.abs(cosValue) < 0.0001 ? Number.POSITIVE_INFINITY : Math.abs(halfScreenWidth / cosValue);
		let yScale = Math.abs(sinValue) < 0.0001 ? Number.POSITIVE_INFINITY : Math.abs(halfScreenHeight / sinValue);
		let scale = Math.min(xScale, yScale);
		let screenX = Math.round(mainCamera.width / 2 + cosValue * scale);
		let screenY = Math.round(mainCamera.height / 2 + sinValue * scale);

		indicator.arrowText.setText(direction_symbol_from_vector(dx, dy));
		indicator.avatar.setTexture(persona.texture.key, persona.frame.name);
		indicator.nameText.setText(persona_name);
		indicator.container.x = screenX;
		indicator.container.y = screenY;
		indicator.container.setVisible(true);
	}


	function refresh_persona_overlays() {
		for (let i = 0; i < Object.keys(personas).length; i++) {
			let persona_name = Object.keys(personas)[i];
			position_persona_label(persona_name);
			refresh_offscreen_indicator(persona_name);
		}
	}


	function set_text_content(element_id, value) {
		let node = document.getElementById(element_id);
		if (node) {
			node.textContent = value;
		}
	}


	function set_html_content(element_id, value) {
		let node = document.getElementById(element_id);
		if (node) {
			node.innerHTML = value;
		}
	}


	function format_status_note(payload) {
		if (!payload || !payload.job || !payload.progress) {
			return "Simulation status is unavailable.";
		}

		if (payload.meta && payload.meta.matches_requested_simulation === false) {
			let active_sim_code = "-";
			if (payload.simulation && payload.simulation.sim_code) {
				active_sim_code = payload.simulation.sim_code;
			}
			return "Backend status currently belongs to another simulation: " + active_sim_code;
		}

		let state = payload.job.state || "idle";
		let stage = payload.progress.current_stage || "idle";
		let promptType = payload.progress.current_prompt_type || null;
		let promptSuffix = promptType ? " Prompt: " + promptType : "";
		if (state == "running" || state == "queued" || state == "cancelling") {
			return "Backend worker is active. Current stage: " + stage + "." + promptSuffix;
		}
		if (state == "failed") {
			return "The latest run job failed. Check the backend log or the error summary below.";
		}
		if (state == "completed") {
			return "The latest run job completed. The frontend should continue consuming movement files.";
		}
		if (state == "stopped") {
			return "The latest run job was stopped gracefully.";
		}
		if (state == "status_unavailable") {
			return "Status file exists but could not be read.";
		}
		return "No active backend run job.";
	}


	function render_simulation_status(payload) {
		let panel = document.getElementById("simulation-status-panel");
		if (!panel || !is_simulation_mode) {
			return;
		}

		let state_node = document.getElementById("simulation-status-state");
		let error_wrapper = document.getElementById("simulation-status-error-wrapper");
		let state = "idle";
		let progress = "0 / 0";
		let world_step = "-";
		let current_persona = "-";
		let current_stage = "idle";
		let current_prompt_type = "-";
		let current_stage_elapsed = "0s";
		let stop_requested = "False";
		let sim_label = sim_code;
		let updated_at = "-";
		let note = "Simulation status is unavailable.";
		let error_text = "";

		if (payload && payload.job && payload.progress && payload.simulation) {
			state = payload.job.state || "idle";
			progress = (payload.job.completed_steps || 0) + " / " + (payload.job.requested_steps || 0);
			world_step = payload.job.current_world_step;
			current_persona = payload.progress.current_persona || "-";
			current_stage = payload.progress.current_stage || "idle";
			current_prompt_type = payload.progress.current_prompt_type || "-";
			current_stage_elapsed = (payload.progress.current_stage_elapsed_sec || 0) + "s";
			stop_requested = payload.job.stop_requested ? "True" : "False";
			sim_label = payload.simulation.sim_code || sim_code;
			updated_at = payload.job.updated_at || "-";
			note = format_status_note(payload);

			if (payload.last_error) {
				error_text = (payload.last_error.type || "Error") + ": " + (payload.last_error.message || "");
			}

			if (payload.progress.current_time && phase != "execute") {
				document.getElementById("game-time-content").innerHTML = payload.progress.current_time;
			}
		}

		let state_class = "label label-default";
		if (state == "running") state_class = "label label-primary";
		else if (state == "queued") state_class = "label label-info";
		else if (state == "cancelling") state_class = "label label-warning";
		else if (state == "completed") state_class = "label label-success";
		else if (state == "stopped") state_class = "label label-warning";
		else if (state == "failed" || state == "status_unavailable") state_class = "label label-danger";

		state_node.className = state_class;
		state_node.textContent = state;
		set_text_content("simulation-status-progress", progress);
		set_text_content("simulation-status-world-step", world_step);
		set_text_content("simulation-status-persona", current_persona);
		set_text_content("simulation-status-stage", current_stage);
		set_text_content("simulation-status-prompt-type", current_prompt_type);
		set_text_content("simulation-status-stage-elapsed", current_stage_elapsed);
		set_text_content("simulation-status-stop-requested", stop_requested);
		set_text_content("simulation-status-sim", sim_label);
		set_text_content("simulation-status-updated", updated_at);
		set_text_content("simulation-status-note", note);
		set_text_content("simulation-status-error", error_text);

		if (error_wrapper) {
			error_wrapper.style.display = error_text ? "block" : "none";
		}
	}


	function fetch_simulation_status() {
		if (!is_simulation_mode || simulation_status_request_in_flight) {
			return;
		}

		simulation_status_request_in_flight = true;
		var status_xobj = new XMLHttpRequest();
		status_xobj.overrideMimeType("application/json");
		status_xobj.open(
			'GET',
			"{% url 'simulation_status' %}?sim_code=" + encodeURIComponent(sim_code),
			true
		);
		status_xobj.addEventListener("load", function() {
			simulation_status_request_in_flight = false;
			if (this.readyState === 4 && status_xobj.status === 200) {
				render_simulation_status(JSON.parse(status_xobj.responseText));
			}
		});
		status_xobj.addEventListener("error", function() {
			simulation_status_request_in_flight = false;
			render_simulation_status({
				"job": {"state": "status_unavailable", "completed_steps": 0, "requested_steps": 0, "current_world_step": "-",
								"stop_requested": false, "updated_at": "-"},
				"progress": {"current_persona": "-", "current_stage": "idle"},
				"simulation": {"sim_code": sim_code},
				"last_error": {"type": "StatusFetchError", "message": "Failed to reach /simulation_status/."}
			});
		});
		status_xobj.send();
	}


	function render_simulation_command_result(payload) {
		let panel = document.getElementById("simulation-command-panel");
		if (!panel || !is_simulation_mode) {
			return;
		}

		let state = "idle";
		let commandText = "-";
		let source = "-";
		let output = "-";
		let note = "No command submitted from the page yet.";
		if (payload) {
			state = payload.state || "idle";
			commandText = payload.command || "-";
			source = payload.source || "-";
			output = payload.error ? payload.error : (payload.output || "-");

			if (payload.meta && payload.meta.matches_requested_simulation === false) {
				note = "The latest command result belongs to another simulation window.";
			} else if (state === "completed") {
				note = "Latest command completed.";
			} else if (state === "failed" || state === "rejected") {
				note = "Latest command failed.";
			} else if (state === "submitted") {
				note = "Command submitted. Waiting for backend to consume it.";
			}
		}

		let stateClass = "label label-default";
		if (state == "completed") stateClass = "label label-success";
		else if (state == "submitted") stateClass = "label label-info";
		else if (state == "failed" || state == "rejected") stateClass = "label label-danger";

		let commandStateNode = document.getElementById("simulation-command-state");
		if (commandStateNode) {
			commandStateNode.className = stateClass;
			commandStateNode.textContent = state;
		}
		set_text_content("simulation-command-last", commandText);
		set_text_content("simulation-command-source", source);
		set_text_content("simulation-command-note", note);
		set_text_content("simulation-command-output", output);
	}


	function fetch_simulation_command_result() {
		if (!is_simulation_mode || simulation_command_result_request_in_flight) {
			return;
		}

		simulation_command_result_request_in_flight = true;
		var result_xobj = new XMLHttpRequest();
		result_xobj.overrideMimeType("application/json");
		result_xobj.open(
			'GET',
			"{% url 'simulation_command_result' %}?sim_code=" + encodeURIComponent(sim_code),
			true
		);
		result_xobj.addEventListener("load", function() {
			simulation_command_result_request_in_flight = false;
			if (this.readyState === 4 && result_xobj.status === 200) {
				render_simulation_command_result(JSON.parse(result_xobj.responseText));
			}
		});
		result_xobj.addEventListener("error", function() {
			simulation_command_result_request_in_flight = false;
			render_simulation_command_result({
				"state": "failed",
				"command": "-",
				"source": "web",
				"error": "Failed to reach /simulation_command_result/."
			});
		});
		result_xobj.send();
	}


	function submit_simulation_command(commandText) {
		let cleanCommand = (commandText || "").trim();
		if (!cleanCommand || simulation_command_request_in_flight) {
			return;
		}

		simulation_command_request_in_flight = true;
		render_simulation_command_result({
			"state": "submitted",
			"command": cleanCommand,
			"source": "web",
			"output": "Submitting command..."
		});

		var command_xobj = new XMLHttpRequest();
		command_xobj.overrideMimeType("application/json");
		command_xobj.open('POST', "{% url 'simulation_command' %}", true);
		command_xobj.setRequestHeader("Content-Type", "application/json");
		command_xobj.addEventListener("load", function() {
			simulation_command_request_in_flight = false;
			if (this.readyState === 4 && command_xobj.status === 200) {
				render_simulation_command_result({
					"state": "submitted",
					"command": cleanCommand,
					"source": "web",
					"output": "Command submitted. Waiting for backend execution..."
				});
				window.setTimeout(fetch_simulation_command_result, 250);
				return;
			}
			render_simulation_command_result({
				"state": "failed",
				"command": cleanCommand,
				"source": "web",
				"error": "Command submission failed."
			});
		});
		command_xobj.addEventListener("error", function() {
			simulation_command_request_in_flight = false;
			render_simulation_command_result({
				"state": "failed",
				"command": cleanCommand,
				"source": "web",
				"error": "Failed to reach /simulation_command/."
			});
		});
		command_xobj.send(JSON.stringify({
			"sim_code": sim_code,
			"command": cleanCommand
		}));
	}


	function bind_simulation_command_controls() {
		if (!is_simulation_mode) {
			return;
		}

		let runStepsInput = document.getElementById("run-steps-input");
		let customCommandInput = document.getElementById("custom-command-input");
		let runStepsButton = document.getElementById("run-steps-button");
		let statusCommandButton = document.getElementById("status-command-button");
		let stopCommandButton = document.getElementById("stop-command-button");
		let saveCommandButton = document.getElementById("save-command-button");
		let customCommandButton = document.getElementById("custom-command-button");

		if (runStepsButton) {
			runStepsButton.onclick = function() {
				let steps = parseInt(runStepsInput.value || "0");
				if (Number.isNaN(steps) || steps <= 0) {
					render_simulation_command_result({
						"state": "failed",
						"command": "run",
						"source": "web",
						"error": "Run steps must be a positive integer."
					});
					return;
				}
				submit_simulation_command("run " + steps);
			};
		}
		if (statusCommandButton) statusCommandButton.onclick = function() { submit_simulation_command("status"); };
		if (stopCommandButton) stopCommandButton.onclick = function() { submit_simulation_command("stop"); };
		if (saveCommandButton) saveCommandButton.onclick = function() { submit_simulation_command("save"); };
		if (customCommandButton) {
			customCommandButton.onclick = function() {
				submit_simulation_command(customCommandInput.value);
			};
		}
		if (customCommandInput) {
			customCommandInput.addEventListener("keydown", function(event) {
				if (event.key === "Enter") {
					event.preventDefault();
					submit_simulation_command(customCommandInput.value);
				}
			});
		}
	}

	if (is_simulation_mode) {
		fetch_simulation_status();
		window.setInterval(fetch_simulation_status, 1500);
		fetch_simulation_command_result();
		window.setInterval(fetch_simulation_command_result, 1500);
	}
	bind_simulation_command_controls();

	// Joon: Phaser 3.0 is oriented around "scenes" -- recall how Pokemon plays: 
	//       there is the outdoor space, and then there is the indoor space; when
	//       you go inside, you transition to a new "scene" and the outdoor space
	//       basically disappears. 
	//       A scene in Phaser has four key methods that are called at different
	//       stages of rendering for different purposes. They are: 
	//       init() -> preload() -> create() -> update()
	//         init() is called only once at the very beginning. This is the 
	//           initialization function in case that is needed. 
	//         preload() is called once and preloads any of the assets
	//         create() is also called once after preloading... creates sprites 
	//           and actually displays stuff
	//         update() is called on each frame during the game play 

	function preload() {  
	  // Loading the necessary images (e.g., the background image, character 
	  // sprites). 

	  // Joon: for load.image, the first parameter is simply the key value that
	  //       you are passing in. The second parameter should be pointed to the
	  //       png file that contains the tileset. 
	  //       Also IMPORTANT: when you create a tileset in Tiled, always be  
	  //       sure to check the "embedded" option. 
	  this.load.image("blocks_1", "{% static 'assets/the_ville/visuals/map_assets/blocks/blocks_1.png' %}");
	  this.load.image("walls", "{% static 'assets/the_ville/visuals/map_assets/v1/Room_Builder_32x32.png' %}");
	  this.load.image("interiors_pt1", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt1.png' %}");
	  this.load.image("interiors_pt2", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt2.png' %}");
	  this.load.image("interiors_pt3", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt3.png' %}");
	  this.load.image("interiors_pt4", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt4.png' %}");
	  this.load.image("interiors_pt5", "{% static 'assets/the_ville/visuals/map_assets/v1/interiors_pt5.png' %}");
	  this.load.image("CuteRPG_Field_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Field_B.png' %}");
	  this.load.image("CuteRPG_Field_C", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Field_C.png' %}");
	  this.load.image("CuteRPG_Harbor_C", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Harbor_C.png' %}");
	  this.load.image("CuteRPG_Village_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Village_B.png' %}");
	  this.load.image("CuteRPG_Forest_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Forest_B.png' %}");
	  this.load.image("CuteRPG_Desert_C", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Desert_C.png' %}");
	  this.load.image("CuteRPG_Mountains_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Mountains_B.png' %}");
	  this.load.image("CuteRPG_Desert_B", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Desert_B.png' %}");
	  this.load.image("CuteRPG_Forest_C", "{% static 'assets/the_ville/visuals/map_assets/cute_rpg_word_VXAce/tilesets/CuteRPG_Forest_C.png' %}");

	  // Joon: This is the export json file you get from Tiled. 
	  this.load.tilemapTiledJSON("map", "{% static 'assets/the_ville/visuals/the_ville_jan7.json' %}");

	  // An atlas is a way to pack multiple images together into one texture. I'm 
	  // using it to load all the player animations (walking left, walking right, 
	  // etc.) in one image. For more info see:
	  // https://labs.phaser.io/view.html?src=src/animation/texture%20atlas%20animation.js
	  // If you don't use an atlas, you can do the same thing with a spritesheet, 
	  // see: https://labs.phaser.io/view.html?src=src/animation/single%20sprite%20sheet.js
	  // Joon: Technically, I think this guy had the best tutorial for atlas: 
	  //       https://www.youtube.com/watch?v=fdXcD9X4NrQ&ab_channel=MorganPage
	  this.load.atlas("atlas", 
	                  "https://mikewesthad.github.io/phaser-3-tilemap-blog-posts/post-1/assets/atlas/atlas.png", 
	                  "https://mikewesthad.github.io/phaser-3-tilemap-blog-posts/post-1/assets/atlas/atlas.json");
	}

	function create() {  
	  const map = this.make.tilemap({ key: "map" });
	  cameraBounds.width = map.widthInPixels;
	  cameraBounds.height = map.heightInPixels;
	  // Joon: Logging map is really helpful for debugging here: 
	  //       console.log(map);

	  // The first parameter is the name you gave to the tileset in Tiled and then
	  // the key of the tileset image in Phaser's cache (i.e. the name you used in
	  // preload)
	  // Joon: for the first parameter here, really take a look at the 
	  //       console.log(map) output. You need to make sure that the name 
	  //       matches.
	  const collisions = map.addTilesetImage("blocks", "blocks_1");
	  const walls = map.addTilesetImage("Room_Builder_32x32", "walls");
	  const interiors_pt1 = map.addTilesetImage("interiors_pt1", "interiors_pt1");
	  const interiors_pt2 = map.addTilesetImage("interiors_pt2", "interiors_pt2");
	  const interiors_pt3 = map.addTilesetImage("interiors_pt3", "interiors_pt3");
	  const interiors_pt4 = map.addTilesetImage("interiors_pt4", "interiors_pt4");
	  const interiors_pt5 = map.addTilesetImage("interiors_pt5", "interiors_pt5");
	  const CuteRPG_Field_B = map.addTilesetImage("CuteRPG_Field_B", "CuteRPG_Field_B");
	  const CuteRPG_Field_C = map.addTilesetImage("CuteRPG_Field_C", "CuteRPG_Field_C");
	  const CuteRPG_Harbor_C = map.addTilesetImage("CuteRPG_Harbor_C", "CuteRPG_Harbor_C");
	  const CuteRPG_Village_B = map.addTilesetImage("CuteRPG_Village_B", "CuteRPG_Village_B");
	  const CuteRPG_Forest_B = map.addTilesetImage("CuteRPG_Forest_B", "CuteRPG_Forest_B");
	  const CuteRPG_Desert_C = map.addTilesetImage("CuteRPG_Desert_C", "CuteRPG_Desert_C");
	  const CuteRPG_Mountains_B = map.addTilesetImage("CuteRPG_Mountains_B", "CuteRPG_Mountains_B");
	  const CuteRPG_Desert_B = map.addTilesetImage("CuteRPG_Desert_B", "CuteRPG_Desert_B");
	  const CuteRPG_Forest_C = map.addTilesetImage("CuteRPG_Forest_C", "CuteRPG_Forest_C");

	  // The first parameter is the layer name (or index) taken from Tiled, the 
	  // second parameter is the tileset you set above, and the final two 
	  // parameters are the x, y coordinate. 
	  // Joon: The "layer name" that comes as the first parameter value  
	  //       literally is taken from our Tiled layer name. So to find out what
	  //       they are; you actually need to open up tiled and see how you 
	  //       named things there. 
	  let tileset_group_1 = [CuteRPG_Field_B, CuteRPG_Field_C, CuteRPG_Harbor_C, CuteRPG_Village_B, 
	  											 CuteRPG_Forest_B, CuteRPG_Desert_C, CuteRPG_Mountains_B, CuteRPG_Desert_B, CuteRPG_Forest_C,
	  											 interiors_pt1, interiors_pt2, interiors_pt3, interiors_pt4, interiors_pt5, walls];
	  const bottomGroundLayer = map.createLayer("Bottom Ground", tileset_group_1, 0, 0);
	  const exteriorGroundLayer = map.createLayer("Exterior Ground", tileset_group_1, 0, 0);
	  const exteriorDecorationL1Layer = map.createLayer("Exterior Decoration L1", tileset_group_1, 0, 0);
	  const exteriorDecorationL2Layer = map.createLayer("Exterior Decoration L2", tileset_group_1, 0, 0);
	  const interiorGroundLayer = map.createLayer("Interior Ground", tileset_group_1, 0, 0);
	  const wallLayer = map.createLayer("Wall", [CuteRPG_Field_C, walls], 0, 0);
	  const interiorFurnitureL1Layer = map.createLayer("Interior Furniture L1", tileset_group_1, 0, 0);
	  const interiorFurnitureL2Layer = map.createLayer("Interior Furniture L2 ", tileset_group_1, 0, 0);
	  const foregroundL1Layer = map.createLayer("Foreground L1", tileset_group_1, 0, 0);
	  const foregroundL2Layer = map.createLayer("Foreground L2", tileset_group_1, 0, 0);
	  foregroundL1Layer.setDepth(2);
	  foregroundL2Layer.setDepth(2);

	  const collisionsLayer = map.createLayer("Collisions", collisions, 0, 0);
	  const worldRenderObjects = [
	  	bottomGroundLayer,
	  	exteriorGroundLayer,
	  	exteriorDecorationL1Layer,
	  	exteriorDecorationL2Layer,
	  	interiorGroundLayer,
	  	wallLayer,
	  	interiorFurnitureL1Layer,
	  	interiorFurnitureL2Layer,
	  	foregroundL1Layer,
	  	foregroundL2Layer,
	  	collisionsLayer
	  ];
	  // const groundLayer = map.createLayer("Ground", walls, 0, 0);
	  // const indoorGroundLayer = map.createLayer("Indoor Ground", walls, 0, 0);
	  // const wallsLayer = map.createLayer("Walls", walls, 0, 0);
	  // const interiorsLayer = map.createLayer("Furnitures", interiors, 0, 0);
	  // const builtInLayer = map.createLayer("Built-ins", interiors, 0, 0);
	  // const appliancesLayer = map.createLayer("Appliances", interiors, 0, 0);
	  // const foregroundLayer = map.createLayer("Foreground", interiors, 0, 0);

	  // Joon : This is where you want to create a custom field for the tileset
	  //        in Tiled. Take a look at this guy's tutorial: 
	  //        https://www.youtube.com/watch?v=MR2CvWxOEsw&ab_channel=MattWilber
	  collisionsLayer.setCollisionByProperty({ collide: true });
	  // By default, everything gets depth sorted on the screen in the order we 
	  // created things. Here, we want the "Above Player" layer to sit on top of 
	  // the player, so we explicitly give it a depth. Higher depths will sit on 
	  // top of lower depth objects.
	  // Collisions layer should get a negative depth since we do not want to see
	  // it. 
	  collisionsLayer.setDepth(-1);
	  // foregroundL1Layer.setDepth(2);
	  // foregroundL1Layer.setDepth(2);

	  // *** SET UP CAMERA *** 
	  // "player" is to be set as the center of mass for our "camera." We 
	  // basically create a game character sprite as we would for our personas 
	  // but we move it to depth -1 and let it pass through the collision map;  
	  // that is, do not have the following line: 
	  // this.physics.add.collider(player, collisionsLayer);
	  // OLD NOTE: Create a sprite with physics enabled via the physics system. 
	  // The image  used for the sprite has a bit of whitespace, so I'm using 
	  // setSize & setOffset to control the size of the player's body.
	  player = this.physics.add.
	                sprite(800, 288, "atlas", "misa-front").
	                setSize(30, 40).
	                setOffset(0, 0);
	  player.setDepth(-1);
	  // Setting up the camera. 
	  mainCamera = this.cameras.main;
	  mainCamera.roundPixels = true;
	  mainCamera.setBounds(0, 0, map.widthInPixels, map.heightInPixels);
	  cameraCenter.x = player.x;
	  cameraCenter.y = player.y;
	  apply_camera_zoom(cameraZoomLevels[cameraZoomLevelIndex]);
	  apply_camera_center(cameraCenter.x, cameraCenter.y);
	  worldRenderObjects.push(player);
	  install_game_shell_input_handlers(this.game.canvas);

	  // *** SET UP PERSONAS *** 
	  // We start by creating the game sprite objects. 
	  for (let i=0; i<Object.keys(spawn_tile_loc).length; i++) { 
	    let persona_name = Object.keys(spawn_tile_loc)[i];
	    let start_pos = [spawn_tile_loc[persona_name][0] * tile_width + tile_width / 2, 
	                     spawn_tile_loc[persona_name][1] * tile_width + tile_width];
	    let new_sprite = this.physics.add
	                         .sprite(start_pos[0], start_pos[1], "atlas", "misa-front")
	                         .setSize(30, 40)
	                         .setOffset(0, 32); // DEBUG 1 --- I added 32 offset on Dec 29. 
	    // Here, we are creating the persona and its pronunciatio sprites.
	    personas[persona_name] = new_sprite;
	    worldRenderObjects.push(new_sprite);
	    pronunciatios[persona_name] = this.add.text(
	                                   new_sprite.body.x + 16, 
	                                   new_sprite.body.y - 92,
	                                   "🦁", {
	                                   font: "28px monospace", 
	                                   fill: "#000000", 
	                                   padding: { x: 8, y: 8}, 
	                                   backgroundColor: "#ffffff",
	                                   border:"solid",
	                                   borderRadius:"10px"}).setDepth(3).setOrigin(0.5, 1);
	    worldRenderObjects.push(pronunciatios[persona_name]);
	    let nameLabelText = this.add.text(
	                                   0,
	                                   0,
	                                   persona_name, {
	                                   font: "12px monospace",
	                                   fill: "#133A1B"}).setOrigin(0.5, 0.5);
	    let nameLabelBox = this.add.rectangle(
	                                   0,
	                                   0,
	                                   nameLabelText.width + 18,
	                                   nameLabelText.height + 10,
	                                   0xFFFFFF,
	                                   0.96).setStrokeStyle(2, 0x43A047, 0.98);
	    let nameLabelContainer = this.add.container(
	                                   new_sprite.body.x + 16,
	                                   new_sprite.body.y - 62,
	                                   [nameLabelBox, nameLabelText]).setDepth(4);
	    worldRenderObjects.push(nameLabelContainer);
	    persona_name_labels[persona_name] = {
	    	container: nameLabelContainer,
	    	box: nameLabelBox,
	    	text: nameLabelText
	    };
	    let indicatorBox = this.add.rectangle(
	                                   0,
	                                   0,
	                                   212,
	                                   50,
	                                   0xFFFFFF,
	                                   0.96).setStrokeStyle(2, 0x1E88E5, 0.98);
	    let indicatorAvatar = this.add.image(-62, 0, "atlas", "misa-front").setDisplaySize(24, 32);
	    let indicatorNameText = this.add.text(
	                                   -40,
	                                   0,
	                                   persona_name, {
	                                   font: "10px monospace",
	                                   fill: "#12324A"}).setOrigin(0, 0.5);
	    let indicatorArrowText = this.add.text(
	                                   67,
	                                   0,
	                                   "→", {
	                                   font: "20px monospace",
	                                   fill: "#0D47A1"}).setOrigin(0.5, 0.5);
	    let indicatorContainer = this.add.container(
	                                   0,
	                                   0,
	                                   [indicatorBox, indicatorAvatar, indicatorNameText, indicatorArrowText]
	                                   ).setDepth(8).setScrollFactor(0).setVisible(false);
	    offscreen_persona_indicators[persona_name] = {
	    	container: indicatorContainer,
	    	box: indicatorBox,
	    	avatar: indicatorAvatar,
	    	nameText: indicatorNameText,
	    	arrowText: indicatorArrowText
	    };
	    position_persona_label(persona_name);
	  }
	  uiCamera = this.cameras.add(0, 0, config.width, config.height);
	  uiCamera.setScroll(0, 0);
	  uiCamera.setZoom(1);
	  uiCamera.roundPixels = true;
	  uiCamera.ignore(worldRenderObjects);
	  for (let i = 0; i < Object.keys(offscreen_persona_indicators).length; i++) {
	  	let persona_name = Object.keys(offscreen_persona_indicators)[i];
	  	mainCamera.ignore(offscreen_persona_indicators[persona_name].container);
	  }
	  refresh_persona_overlays();

	  // Create the player's walking animations from the texture atlas. These are
	  // stored in the global animation manager so any sprite can access them.
	  const anims = this.anims;
	  anims.create({
	    key: "misa-left-walk",
	    frames: anims.generateFrameNames("atlas", { prefix: "misa-left-walk.", start: 0, end: 3, zeroPad: 3 }),
	    frameRate: 4,
	    repeat: -1 });

	  anims.create({
	    key: "misa-right-walk",
	    frames: anims.generateFrameNames("atlas", { prefix: "misa-right-walk.", start: 0, end: 3, zeroPad: 3 }),
	    frameRate: 4,
	    repeat: -1 });

	  anims.create({
	    key: "misa-front-walk",
	    frames: anims.generateFrameNames("atlas", { prefix: "misa-front-walk.", start: 0, end: 3, zeroPad: 3 }),
	    frameRate: 4,
	    repeat: -1 });

	  anims.create({
	    key: "misa-back-walk",
	    frames: anims.generateFrameNames("atlas", { prefix: "misa-back-walk.", start: 0, end: 3, zeroPad: 3 }),
	    frameRate: 4,
	    repeat: -1 });
	}


	function update(time, delta) {
		// *** SETUP PLAY AND PAUSE BUTTON *** 
		let play_context = this;
		function game_resume() {  
			play_context.scene.resume();
		}  
		play_button.onclick = function(){
			game_resume();
		};
		function game_pause() {  
			play_context.scene.pause();
		}  
		pause_button.onclick = function(){
			game_pause();
		};

	  // *** MOVE CAMERA *** 
	  // This is where we finish up the camera setting we started in the create() 
	  // function. We set the movement speed of the camera and wire up the keys to
	  // map to the actual movement.
	  const camera_speed = 520 / mainCamera.zoom;
	  let moveLeft = is_game_focused && cameraInputState.left;
	  let moveRight = is_game_focused && cameraInputState.right;
	  let moveUp = is_game_focused && cameraInputState.up;
	  let moveDown = is_game_focused && cameraInputState.down;
	  let cameraDeltaX = 0;
	  let cameraDeltaY = 0;
	  if (moveLeft) cameraDeltaX -= camera_speed * (delta / 1000.0);
	  if (moveRight) cameraDeltaX += camera_speed * (delta / 1000.0);
	  if (moveUp) cameraDeltaY -= camera_speed * (delta / 1000.0);
	  if (moveDown) cameraDeltaY += camera_speed * (delta / 1000.0);
	  if (cameraDeltaX !== 0 || cameraDeltaY !== 0) {
	  	apply_camera_center(cameraCenter.x + cameraDeltaX, cameraCenter.y + cameraDeltaY);
	  }
	  let directionSymbol = "·";
	  if (moveLeft && moveUp) directionSymbol = "↖";
	  else if (moveRight && moveUp) directionSymbol = "↗";
	  else if (moveLeft && moveDown) directionSymbol = "↙";
	  else if (moveRight && moveDown) directionSymbol = "↘";
	  else if (moveLeft) directionSymbol = "←";
	  else if (moveRight) directionSymbol = "→";
	  else if (moveUp) directionSymbol = "↑";
	  else if (moveDown) directionSymbol = "↓";
	  if (directionSymbol !== last_direction_indicator) {
	  	update_direction_indicator(directionSymbol);
	  }
	  refresh_persona_overlays();

	  // console.log("phase: " + phase + ", step: " + step);
	  // *** MOVE PERSONAS ***
	  // Moving personas take place in three distinct phases: "process," "update,"
	  // and "execute." These phases are determined by the value of <phase>. 
	  // Only one of the three phases is incurred in each update cycle. 
	  if (phase == "process") {
	    // "process" takes all current locations of the personas and send them to
	    // the frontend server in a json form. Here, we first create the json 
	    // file that records all persona locations: 
	    let data = {"step": step, 
	    						"sim_code": sim_code,
	                "environment": {}}
	    for (let i=0; i<Object.keys(personas).length; i++) {
	      let persona_name = Object.keys(personas)[i];
	      data["environment"][persona_name] = {"maze": curr_maze,
	                                           "x": Math.ceil((personas[persona_name].body.position.x) / tile_width),
	                                           "y": Math.ceil((personas[persona_name].body.position.y) / tile_width)}
	    }
	    var json = JSON.stringify(data);
	    // We then send this to the frontend server: 
	    var retrieve_xobj = new XMLHttpRequest();
	    retrieve_xobj.overrideMimeType("application/json");
	    retrieve_xobj.open('POST', "{% url 'process_environment' %}", true);
	    retrieve_xobj.send(json);   
	    // Finally, we update the phase variable to start the "udpate" process. 
	    // Now that we sent all persona locations to the backend server, we need
	    // to wait until the backend determines what the personas will do next. 
	    phase = "update";
	  } 

	  else if (phase == "update") { 
	    // Update is where we * wait * for the backend server to finish 
	    // computing about what the personas will do next given their current 
	    // situation. 
	    // We do this by continuously asking the backend server if it is ready. 
	    // The backend server is ready when it returns a json that has a key-val
	    // pair with "<move>": true.
	    // Note that we do not want to overburden the backend too much by 
	    // over-querying; so, we have a timer set so we only query it once every
	    // timer_max cycles. 
	    if (timer <= 0) {
	      var update_xobj = new XMLHttpRequest();
	      update_xobj.overrideMimeType("application/json");
	      update_xobj.open('POST', "{% url 'update_environment' %}", true);
	      update_xobj.addEventListener("load", function() {
	        if (this.readyState === 4) {
	          if (update_xobj.status === 200) {
	            if (JSON.parse(update_xobj.responseText)["<step>"] == step) {
	              execute_movement = JSON.parse(update_xobj.responseText)
	              phase = "execute";
	            }
	            timer = timer_max;
	          }
	        }
	      });
	      update_xobj.send(JSON.stringify({"step": step, "sim_code": sim_code }));   
	    }
	    timer = timer - 1; 
	  } 

	  else { 
	    // This is where we actually move the personas in the visual world. Each
	    // backend computation in execute_movement moves each persona by one tile
	    // (or some personas might not move if they choose not to). 
	    // The execute_count_max is computed by tile_width/movement_speed, which
	    // defines a one step sequence in this world. 
	    document.getElementById("game-time-content").innerHTML = execute_movement["meta"]["curr_time"];
	    for (let i=0; i<Object.keys(personas).length; i++) {
	      let curr_persona_name = Object.keys(personas)[i];
	      let curr_persona = personas[curr_persona_name];
	      let curr_pronunciatio = pronunciatios[Object.keys(personas)[i]];

	      if (execute_count == execute_count_max) { 
	        let curr_x = execute_movement["persona"][curr_persona_name]["movement"][0];
	        let curr_y = execute_movement["persona"][curr_persona_name]["movement"][1];
	        movement_target[curr_persona_name] = [curr_x * tile_width, 
	                                              curr_y * tile_width]; 
	        let pronunciatio_content = execute_movement["persona"][curr_persona_name]["pronunciatio"];
	        // This is what gives the pronunciatio balloon the name initials. We 
	        // use regex to extract the initials of the personas. 
	        // E.g., "Dolores Murphy" -> "DM"
	        let rgx = new RegExp(/(\p{L}{1})\p{L}+/, 'gu');
	        let initials = [...curr_persona_name.matchAll(rgx)] || [];
	        initials = (
	          (initials.shift()?.[1] || '') + (initials.pop()?.[1] || '')
	        ).toUpperCase();
	        pronunciatios[curr_persona_name].setText(initials + ": " + pronunciatio_content);
	      }

	      console.log(curr_persona_name);
	      if (execute_count > 0) {
	        if (curr_persona.body.x < movement_target[curr_persona_name][0]) {
	          curr_persona.body.x += movement_speed; 
	          anims_direction = "r";
	          pre_anims_direction = "r"
	          pre_anims_direction_dict[curr_persona_name] = "r"
	        } else if (curr_persona.body.x > movement_target[curr_persona_name][0]) {
	          curr_persona.body.x -= movement_speed; 
	          anims_direction = "l";
	          pre_anims_direction = "l"
	          pre_anims_direction_dict[curr_persona_name] = "l"
	        } else if (curr_persona.body.y < movement_target[curr_persona_name][1]) {
	          curr_persona.body.y += movement_speed;
	          anims_direction = "d";
	          pre_anims_direction = "d"
	          pre_anims_direction_dict[curr_persona_name] = "d"
	        } else if (curr_persona.body.y > movement_target[curr_persona_name][1]) {
	          curr_persona.body.y -= movement_speed;
	          anims_direction = "u";
	          pre_anims_direction = "u"
	          pre_anims_direction_dict[curr_persona_name] = "u"
	        } else {
	        	anims_direction = "";
	        }

	        position_persona_label(curr_persona_name);

          if (anims_direction == "l") {
			      curr_persona.anims.play("misa-left-walk", true);
			    } else if (anims_direction == "r") {
			      curr_persona.anims.play("misa-right-walk", true);
			    } else if (anims_direction == "u") {
			      curr_persona.anims.play("misa-back-walk", true);
			    } else if (anims_direction == "d") {
			      curr_persona.anims.play("misa-front-walk", true);
			    } else {
			      curr_persona.anims.stop();

			      // If we were moving, pick an idle frame to use
			      if (pre_anims_direction_dict[curr_persona_name] == "l") curr_persona.setTexture("atlas", "misa-left");else
			      if (pre_anims_direction_dict[curr_persona_name] == "r") curr_persona.setTexture("atlas", "misa-right");else
			      if (pre_anims_direction_dict[curr_persona_name] == "u") curr_persona.setTexture("atlas", "misa-back");else
			      if (pre_anims_direction_dict[curr_persona_name] == "d") curr_persona.setTexture("atlas", "misa-front");
			    };

	      } 
	      else {
	        // Once we are done moving the personas, we move on to the "process"
	        // stage where we will send the current locations of all personas at the
	        // end of the movemments to the frontend server, and then the backend.
	        for (let i=0; i<Object.keys(personas).length; i++) {
	          let curr_persona_name = Object.keys(personas)[i]
	          let curr_persona = personas[curr_persona_name];
	          curr_persona.body.x = movement_target[curr_persona_name][0];
	          curr_persona.body.y = movement_target[curr_persona_name][1];
	          position_persona_label(curr_persona_name);
	        }
	        phase = "process";
	        execute_count = execute_count_max + 1;
	        step = step + 1;
	        refresh_persona_overlays();
	      }
	    }

	    // Filling in the action description. 
	    if (execute_count == execute_count_max) { 
	      for (let i=0; i<Object.keys(personas).length; i++) {
	      	let action_description = ""
	        let curr_persona_name = Object.keys(personas)[i];
	        let curr_persona_name_os = curr_persona_name.replace(/ /g,"_");
	        let description_content = execute_movement["persona"][curr_persona_name]["description"];
	        let chat_content = ""

	        if (execute_movement["persona"][curr_persona_name]["chat"] != null ){
		        for (let j=0; j<execute_movement["persona"][curr_persona_name]["chat"].length; j++) { 
		        	chat_content += execute_movement["persona"][curr_persona_name]["chat"][j][0] + ": " + execute_movement["persona"][curr_persona_name]["chat"][j][1] + "<br>"
		        }
		      } else {
		      	chat_content = "<em>None at the moment</em>"
		      }
	        // action_description += description_content + "<br>";

	        document.getElementById("current_action__"+curr_persona_name_os).innerHTML = description_content.split("@")[0];
	        document.getElementById("target_address__"+curr_persona_name_os).innerHTML = description_content.split("@")[1];
	        document.getElementById("chat__"+curr_persona_name_os).innerHTML = chat_content;
	      }
	      
	    }

	    execute_count = execute_count - 1;
	  }
	}

	// Control button binders
	var play_button=document.getElementById("play_button");
	var pause_button=document.getElementById("pause_button");
</script>
